; ─────────────────────────────────────────────────
; DISCOVTRIP — Configuration PHP pour Hostinger
; Copier dans public/.user.ini
; Les directives mod_php dans .htaccess sont ignorées
; sur les hébergements Hostinger (PHP-FPM).
; ─────────────────────────────────────────────────

upload_max_filesize = 10M
post_max_size = 12M
memory_limit = 256M
max_execution_time = 60
max_input_time = 60
display_errors = Off
log_errors = On
error_log = /var/log/php_errors.log
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = "Lax"