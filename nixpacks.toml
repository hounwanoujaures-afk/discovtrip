[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql",
           "php84Extensions.mbstring", "php84Extensions.xml",
           "php84Extensions.curl", "php84Extensions.gd",
           "php84Extensions.intl",
           "php84Extensions.zip",
           "nodejs_20", "npm"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm ci",
  "npm run build"
]

[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link --force && php artisan serve --host=0.0.0.0 --port=$PORT"
```

**`Procfile`** — en backup si Nixpacks ne lit pas le toml :
```
web: php artisan serve --host=0.0.0.0 --port=$PORT